name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Shared library
        run: dotnet build HRPeripheral.Shared/ -c Release --no-restore

      - name: Build HRPeripheral (Wear OS)
        run: dotnet build HRPeripheral/ -c Release --no-restore

      - name: Build HRPeripheral.Companion (Phone)
        run: dotnet build HRPeripheral.Companion/ -c Release --no-restore

      - name: Run tests
        run: dotnet test HRPeripheral.Tests/ -c Release --no-restore --verbosity normal
